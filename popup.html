<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>치지직 라이브 감지기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      background: #0d0d0f;
      color: #f0f0f0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      padding: 0;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #00c73c 0%, #00a832 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      margin-top: 1px;
    }

    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 상태 카드 */
    .card {
      background: #1a1a1e;
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid #2a2a30;
    }

    .card-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .card-value {
      font-size: 13px;
      color: #f0f0f0;
      font-weight: 500;
      word-break: break-all;
    }

    .card-value.mono {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #00c73c;
      letter-spacing: 0.5px;
    }

    .card-value.muted {
      color: #555;
      font-style: italic;
    }

    /* 채널 입력 */
    .input-row {
      display: flex;
      gap: 8px;
    }

    .channel-input {
      flex: 1;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 8px;
      padding: 9px 12px;
      color: #f0f0f0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .channel-input:focus {
      border-color: #00c73c;
    }

    .channel-input::placeholder {
      color: #444;
    }

    /* 버튼 */
    .btn {
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #00c73c;
      color: #000;
    }

    .btn-primary:hover {
      background: #00e044;
    }

    .btn-danger {
      background: #2a1a1a;
      color: #ff4d4d;
      border: 1px solid #3a2020;
    }

    .btn-danger:hover {
      background: #3a2020;
    }

    .btn-secondary {
      background: #1a1a1e;
      color: #aaa;
      border: 1px solid #2a2a30;
    }

    .btn-secondary:hover {
      background: #22222a;
    }

    /* 상태 배지 */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #00c73c;
      box-shadow: 0 0 6px #00c73c88;
      animation: pulse 1.5s infinite;
    }

    .status-dot.error {
      background: #ff4d4d;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 12px;
      color: #888;
    }

    .status-text.active {
      color: #00c73c;
    }

    /* 새로고침 알림 */
    .refresh-notice {
      background: linear-gradient(135deg, #1a1000, #201500);
      border: 1px solid #3a2800;
      border-radius: 12px;
      padding: 14px 16px;
      display: none;
    }

    .refresh-notice.visible {
      display: block;
    }

    .refresh-notice-title {
      font-size: 11px;
      color: #ff9900;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-countdown {
      font-size: 20px;
      font-weight: 800;
      color: #ffbb33;
      margin-top: 4px;
    }

    .refresh-countdown span {
      font-size: 13px;
      font-weight: 500;
      color: #ff9900;
      margin-left: 4px;
    }

    /* 에러 카드 */
    .error-card {
      background: #1a0808;
      border: 1px solid #3a1515;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 11px;
      color: #ff7070;
      display: none;
      line-height: 1.5;
    }

    .error-card.visible {
      display: block;
    }

    /* 구분선 */
    .divider {
      height: 1px;
      background: #2a2a30;
    }

    /* 체크 카드 그리드 */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .info-grid .card {
      padding: 12px;
    }

    .info-grid .card-value {
      font-size: 11px;
    }

    /* 설정 그리드 */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .setting-item {
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .setting-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .setting-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .setting-input {
      width: 100%;
      background: #0d0d0f;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      color: #f0f0f0;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }

    .setting-input:focus {
      border-color: #00c73c;
    }

    .setting-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .setting-unit {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
    }
      background: #0a1a0d;
      border: 1px solid #1a3020;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px;
      color: #5a9970;
      display: none;
      line-height: 1.5;
    }

    .auto-detect-banner.visible {
      display: block;
    }

    .footer {
      padding: 10px 16px 14px;
      text-align: center;
      font-size: 10px;
      color: #333;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">📡</div>
  <div>
    <div class="header-title">치지직 라이브 감지기</div>
    <div class="header-sub">liveId 변경 감지 & 자동 새로고침</div>
  </div>
</div>

<div class="body">

  <!-- 자동 감지 배너 -->
  <div class="auto-detect-banner" id="autoDetectBanner">
    ✅ 치지직 라이브 페이지 감지됨. 채널 ID를 자동으로 불러왔습니다.
  </div>

  <!-- 설정: 갱신 주기 / 새로고침 대기 -->
  <div class="settings-grid">
    <div class="setting-item">
      <div class="setting-label">갱신 주기</div>
      <div class="setting-input-row">
        <input type="number" class="setting-input" id="checkIntervalInput" value="10" min="5" max="3600" />
        <span class="setting-unit">초</span>
      </div>
    </div>
    <div class="setting-item">
      <div class="setting-label">새로고침 대기</div>
      <div class="setting-input-row">
        <input type="number" class="setting-input" id="refreshDelayInput" value="5" min="1" max="60" />
        <span class="setting-unit">초</span>
      </div>
    </div>
  </div>

  <!-- 채널 ID 입력 -->
  <div>
    <div style="font-size:11px; color:#666; margin-bottom:6px; font-weight:600;">채널 ID</div>
    <div class="input-row">
      <input
        type="text"
        class="channel-input"
        id="channelInput"
        placeholder="채널 ID를 입력하세요"
      />
      <button class="btn btn-primary" id="startBtn">시작</button>
      <button class="btn btn-danger" id="stopBtn" style="display:none;">중지</button>
    </div>
  </div>

  <!-- 모니터링 상태 -->
  <div class="card">
    <div class="card-label">모니터링 상태</div>
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">대기 중</div>
    </div>
  </div>

  <!-- Live ID / 갱신 일시 -->
  <div class="info-grid">
    <div class="card">
      <div class="card-label">Live ID</div>
      <div class="card-value mono" id="liveIdDisplay">-</div>
    </div>
    <div class="card">
      <div class="card-label">마지막 갱신</div>
      <div class="card-value" id="lastCheckedDisplay" style="font-size:11px; line-height:1.6;">-</div>
    </div>
  </div>

  <!-- 새로고침 카운트다운 -->
  <div class="refresh-notice" id="refreshNotice">
    <div class="refresh-notice-title">⚠️ liveId 변경 감지</div>
    <div class="refresh-countdown" id="countdown">5<span>초 후 새로고침 됩니다.</span></div>
  </div>

  <!-- 에러 표시 -->
  <div class="error-card" id="errorCard"></div>

</div>

<div class="footer" id="footerText">10초 주기로 자동 체크 • chzzk.naver.com</div>

<script src="popup.js"></script>
</body>
</html>
